# ---------------------------------------------------------------------------
# INTEGRATION
# ---------------------------------------------------------------------------

integration:
  daemon:
    description: "Add optional 'ui' command to daemon CLI"
    changes:
      - "daemon.py: add --ui flag to start reactive grid viewer"
      - "Grid reads from existing SQLite databases (knowledge, messages, agents)"
      - "Grid auto-refreshes every 5 seconds"

  knowledge_store:
    description: "Hook cell change tracking into KnowledgeStore updates"
    changes:
      - "KnowledgeStore.update(): log cell change to cell_change_log"
      - "KnowledgeStore.add(): create reactive_cells rows for new entry"

# ---------------------------------------------------------------------------
# TESTING CHECKLIST FOR HAIKU
# ---------------------------------------------------------------------------

tests:
  - name: "ASCII renderer displays knowledge grid"
    test: "Load 10 knowledge entries. Assert ASCII table renders correctly."

  - name: "Cell change logged on knowledge update"
    test: |
      Update knowledge entry confidence.
      Assert cell_change_log has new row with old/new values.

  - name: "Cascade triggers update"
    test: |
      Change confidence cell (cascades_to: [score]).
      Assert score cell recalculated.

  - name: "Grid auto-refreshes"
    test: "Start grid viewer. Update knowledge in background. Assert grid reflects change within 5 seconds."
