                # Filter messages by proximity
            else:
                # Existing behavior

  base_agent:
    new_properties:
      - |
        @property
        def position(self) -> str:
            """Agent's current dodecet position in geometric space."""
            return self._coordinator.get_position(self.agent_id)

    new_methods:
      - |
        def _update_position_on_outcome(self, message, outcome):
            """Called after task completion to drift position."""
            self._coordinator.drift(
                agent_id=self.agent_id,
                task_message_id=message.id,
                outcome=outcome
            )

  scheduler:
    description: |
      Scheduler.get_unowned_next() can use spatial proximity to assign tasks.
      Closest agent gets priority for matching tasks.
    changes:
      - "Optional spatial_assign parameter in get_unowned_next()"
      - "When enabled, computes task position and finds closest idle agent"

