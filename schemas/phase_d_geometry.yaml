# ============================================================================
# PHASE D: GEOMETRIC COORDINATOR
# ============================================================================
# Positions agents in a multidimensional space. Tasks route to nearby agents
# via spatial queries instead of explicit routing rules. Agents self-organize
# by moving toward tasks they succeed at.
#
# WHAT CHANGES:
#   - New table: agent_positions (dodecet-encoded position per agent)
#   - New table: task_positions (computed position per task/message)
#   - New class: GeometricCoordinator with KD-tree spatial queries
#   - MessageBus.receive() gains optional spatial filtering
#   - Agents gain .position property (auto-updated based on performance)
#
# WHAT DOESN'T CHANGE:
#   - Explicit routing still works (fallback for simple cases)
#   - Agent roles unchanged
#   - KnowledgeStore and memory unchanged
#
# DEPENDS ON:
#   - Phase C (Router): Geometry finds agents; router picks model tier
#   - Phase B (Memory): Position learning uses episodic + procedural memory
#
# IMPLEMENTATION NOTES FOR HAIKU:
#   - File: crew/geometry/__init__.py
#   - File: crew/geometry/position.py (DodecetPosition dataclass)
#   - File: crew/geometry/coordinator.py (GeometricCoordinator)
#   - File: crew/geometry/kdtree.py (spatial index)
#   - File: crew/geometry/flow.py (Ricci flow self-organization)
#   - Tables go in data/messages.db alongside message tables
# ============================================================================

# ---------------------------------------------------------------------------
# DODECET POSITION ENCODING
# ---------------------------------------------------------------------------
# 12-bit position in 3 dimensions. 4 bits per dimension = 16 values each.
# Total: 16 × 16 × 16 = 4,096 unique positions.
# Stored as a single hex string for compactness.

dodecet_position:
  description: |
    A position in 3-dimensional agent space using dodecet (12-bit) encoding.
    Each dimension has 16 discrete values (0-15), encoded as hex nibbles.

    Dimensions:
      X (Domain Expertise): 0=general → F=ultra-specialized
      Y (Task Phase):       0=input/research → F=output/delivery
      Z (Skill Level):      0=novice → F=expert

    Example positions:
      Researcher (generalist):    "2 2 7" = 0x227 (general, early-phase, intermediate)
      Researcher (ML specialist): "C 2 A" = 0xC2A (specialized ML, early, proficient)
      Critic (quality expert):    "8 C D" = 0x8CD (mid-specialized, late-phase, expert)
      Distiller (synthesis):      "4 E 9" = 0x4E9 (moderate, output-focused, skilled)

  encoding:
    bits: 12
    dimensions: 3
    bits_per_dimension: 4
    values_per_dimension: 16
    total_positions: 4096
    format: "hex string (3 chars)"
    example: "C2A"

  axes:
    x_domain:
      name: "Domain Expertise"
      min: 0
      max: 15
      description: |
        0 = General purpose (knows a bit about everything)
        8 = Moderate specialization (ML, NLP, etc.)
        F = Ultra-specialized (specific paper domain, niche technique)

    y_phase:
      name: "Task Lifecycle Phase"
      min: 0
      max: 15
      description: |
        0 = Input/Discovery (finding sources, gathering data)
        8 = Processing (analysis, synthesis, transformation)
        F = Output/Delivery (formatting, presenting, teaching)

    z_skill:
      name: "Skill Level"
      min: 0
      max: 15
      description: |
        0 = Novice (< 10 tasks completed)
        5 = Competent (10-50 tasks, 60% success)
        A = Proficient (50-200 tasks, 75% success)
        F = Expert (200+ tasks, 90% success)

# ---------------------------------------------------------------------------
# AGENT POSITION TABLE
# ---------------------------------------------------------------------------

agent_position:
  agent_id:
    type: string
    primary_key: true

  position:
    type: string
    description: "3-char hex dodecet position"
    example: "C2A"

  x_domain:
    type: integer
    range: [0, 15]

  y_phase:
    type: integer
    range: [0, 15]

  z_skill:
    type: integer
    range: [0, 15]

  # Learning: position drifts based on performance
  initial_position:
    type: string
    description: "Where agent started (based on role defaults)"

  drift_history:
    type: list
    description: "History of position changes [{from, to, reason, at}]"
    default: "[]"

  last_updated:
    type: datetime

  sqlite_schema: |
    CREATE TABLE IF NOT EXISTS agent_positions (
        agent_id         TEXT    PRIMARY KEY,
        position         TEXT    NOT NULL,
        x_domain         INTEGER NOT NULL,
        y_phase          INTEGER NOT NULL,
        z_skill          INTEGER NOT NULL,
        initial_position TEXT    NOT NULL,
        drift_history    TEXT    DEFAULT '[]',
        last_updated     TEXT    NOT NULL
    );

# ---------------------------------------------------------------------------
# TASK POSITION (computed for incoming messages)
# ---------------------------------------------------------------------------

task_position:
  message_id:
    type: integer
    primary_key: true

  position:
    type: string
    description: "Computed position based on task characteristics"

  x_domain:
    type: integer
    description: "Computed from: tags, topic, category"

  y_phase:
    type: integer
    description: "Computed from: message type (research=early, distill=late)"

  z_skill:
    type: integer
    description: "Computed from: complexity score (from Phase C router)"

  sqlite_schema: |
    CREATE TABLE IF NOT EXISTS task_positions (
        message_id  INTEGER PRIMARY KEY,
        position    TEXT    NOT NULL,
        x_domain    INTEGER NOT NULL,
        y_phase     INTEGER NOT NULL,
        z_skill     INTEGER NOT NULL,
        created_at  TEXT    NOT NULL
    );

