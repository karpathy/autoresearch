# ---------------------------------------------------------------------------
# SPATIAL QUERY ENGINE
# ---------------------------------------------------------------------------

spatial_query:
  description: |
    Find agents near a task position using Euclidean distance in 3D dodecet space.
    Uses KD-tree for O(log n) queries instead of O(n) linear scan.

  distance_function: |
    def dodecet_distance(pos_a: str, pos_b: str) -> float:
        """Euclidean distance between two dodecet positions."""
        ax, ay, az = int(pos_a[0], 16), int(pos_a[1], 16), int(pos_a[2], 16)
        bx, by, bz = int(pos_b[0], 16), int(pos_b[1], 16), int(pos_b[2], 16)
        return math.sqrt((ax-bx)**2 + (ay-by)**2 + (az-bz)**2)

  query_api: |
    def find_nearest_agents(
        task_position: str,
        max_distance: float = 8.0,
        max_results: int = 5,
        exclude_busy: bool = True
    ) -> List[Tuple[str, float]]:
        """Find agents closest to task position.

        Returns: [(agent_id, distance), ...] sorted by distance
        """

  routing_flow: |
    1. Task message arrives
    2. Compute task position from message characteristics
    3. Query KD-tree: find_nearest_agents(task_position)
    4. Filter: exclude busy agents, check capabilities
    5. Select closest available agent
    6. If no agents within max_distance: expand radius or use explicit routing

# ---------------------------------------------------------------------------
# POSITION DRIFT (Self-Organization)
# ---------------------------------------------------------------------------

drift:
  description: |
    Agents move in dodecet space based on task outcomes.
    Success → drift toward task position (become more specialized)
    Failure → drift away from task position (avoid unsuitable tasks)

  algorithm: |
    After task completion:

    if outcome == success:
        # Move 1 unit toward task position (each dimension independently)
        for dim in [x, y, z]:
            if agent[dim] < task[dim]: agent[dim] += 1
            elif agent[dim] > task[dim]: agent[dim] -= 1
        # Clamp to [0, 15]

    if outcome == failure:
        # Move 1 unit away from task position
        for dim in [x, y, z]:
            if agent[dim] < task[dim]: agent[dim] -= 1
            elif agent[dim] > task[dim]: agent[dim] += 1
        # Clamp to [0, 15]

  drift_rate:
    type: integer
    default: 1
    description: "Units to drift per outcome"
    config_key: "geometry.drift_rate"

  max_drift_per_day:
    type: integer
    default: 3
    description: "Maximum total drift per day (prevents wild oscillation)"

