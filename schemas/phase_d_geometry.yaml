      researcher_1: {position: "427"}  # Moved toward task (x: 3→4, y: 2→2, z: 8→7)

# ---------------------------------------------------------------------------
# TESTING CHECKLIST FOR HAIKU
# ---------------------------------------------------------------------------

tests:
  - name: "Distance calculation is correct"
    test: |
      distance("000", "FFF") should be sqrt(15²+15²+15²) ≈ 25.98
      distance("888", "888") should be 0.0
      distance("000", "100") should be 1.0

  - name: "KD-tree finds nearest agents"
    test: |
      Insert 5 agents at known positions.
      Query nearest to task position.
      Assert correct ordering by distance.

  - name: "Drift moves agent toward successful task"
    test: |
      Agent at (5, 5, 5), task at (8, 3, 7), outcome=success.
      After drift: agent at (6, 4, 6).

  - name: "Drift moves agent away from failed task"
    test: |
      Agent at (5, 5, 5), task at (8, 3, 7), outcome=failure.
      After drift: agent at (4, 6, 4).

  - name: "Max drift per day enforced"
    test: |
      Set max_drift_per_day=3. Complete 10 tasks.
      Assert total drift ≤ 3 units.

  - name: "Fallback to explicit routing when no nearby agents"
    test: |
      Task at position far from all agents (distance > max_distance).
      Assert falls back to role-based routing.
