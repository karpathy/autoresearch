# Multi-Language Configuration Tips:
# - All services above are accessible internationally
# - Chinese models excel at Chinese language understanding
# - Can be mixed with English-focused models (OpenAI, Anthropic)
# - Good for: technical Chinese documentation, cross-cultural research
# - Typical workflow: Use Chinese models for Chinese content,
#   English models for synthesis/English research
#
# Setup Instructions:
# 1. Register with each service
# 2. Get API key/credentials
