# Text embedding for semantic linking
openai_embedding:
  enabled: false
  provider: openai
  base_url: "https://api.openai.com/v1"
  model: "text-embedding-3-large"
  api_key: "your key here"
  rate_limit_requests_per_minute: 100
  description: "For semantic similarity and knowledge graph linking"
  use_case: "Find related research findings, build knowledge connections"

# Configuration notes:
# - rate_limit: Set based on your account tier (free vs paid)
# - temperature: 0.7 = balanced, 0.2 = deterministic, 1.0 = creative
# - max_tokens: Limit context window (8k for gpt-4, 16k for gpt-4-turbo)
# - To test: ar test openai_gpt4
