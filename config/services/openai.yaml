# OpenAI Services Configuration Template
# Uncomment the services you want to use and add your API keys
# Get your key at: https://platform.openai.com/api-keys

# Primary GPT-4 model for advanced reasoning
openai_gpt4:
  enabled: false
  provider: openai
  base_url: "https://api.openai.com/v1"
  model: "gpt-4-turbo"
  api_key: "your key here"
  max_tokens: 8000
  rate_limit_tokens_per_minute: 10000
  temperature: 0.7
  top_p: 0.9
  description: "Primary reasoning model for research direction and analysis"
  use_case: "Complex research questions, hypothesis generation"

# GPT-4 Mini for faster, cheaper inference
openai_gpt4_mini:
  enabled: false
  provider: openai
  base_url: "https://api.openai.com/v1"
  model: "gpt-4-mini"
  api_key: "your key here"
  max_tokens: 4000
  rate_limit_tokens_per_minute: 15000
  temperature: 0.7
  description: "Fast GPT-4 for synthesis and summaries"
  use_case: "Quick analysis, aggregation, report generation"

