# macOS Apple Silicon (MPS) training recipe
# Derived from miolini/autoresearch-macos fork.
# Key differences from CUDA: smaller batch, no sliding window (no FA3).

[model]
aspect_ratio = 64
head_dim = 128
window_pattern = "L"     # full context only (SDPA, no sliding window)

[optimization]
total_batch_size = 65536  # 2^16, ~65K tokens per optimizer step
embedding_lr = 0.6
unembedding_lr = 0.004
matrix_lr = 0.04
scalar_lr = 0.5
weight_decay = 0.2
adam_betas = [0.8, 0.95]
warmup_ratio = 0.0
warmdown_ratio = 0.5
final_lr_frac = 0.0

[hardware]
device_batch_size = 16
