<div
  id="daemon-status-panel"
  hx-get="{{ request.url_for('daemon_status_partial') }}"
  hx-trigger="every 5s"
  hx-swap="outerHTML"
  class="mt-4 rounded-xl border p-4 text-sm {% if daemon_status == 'running' %}border-emerald-500/40 bg-emerald-500/10 text-emerald-200{% else %}border-amber-500/40 bg-amber-500/10 text-amber-200{% endif %}"
>
  <p class="font-medium text-white">Daemon: {% if daemon_status == 'running' %}running{% else %}not running{% endif %}</p>
  <p class="mt-1">Plan-Do and Check-Action runs are executed by the daemon.</p>
  {% if daemon_status != 'running' %}
  <p class="mt-2">Start it in a terminal:</p>
  <p class="mt-1 font-mono-id rounded-lg bg-slate-900/80 px-3 py-2 text-xs">uv run pdca_system/daemon.py</p>
  {% endif %}
</div>
