{% if events %}
  {% for event in events %}
  <article class="min-w-0 rounded-lg border border-slate-800 bg-slate-900/80 px-3 py-3">
    <p class="min-w-0 break-words text-sm font-medium text-white">{{ event.display_message | default(event.message) }}</p>
    <p class="mt-2 text-xs text-slate-500"><span class="uppercase tracking-[0.2em]">{{ event.kind }}</span> · {{ event.created_at_human }}</p>
  </article>
  {% endfor %}
{% else %}
<p class="text-sm text-slate-500">No events yet.</p>
{% endif %}
