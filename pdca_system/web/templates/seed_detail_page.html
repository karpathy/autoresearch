{% extends "base.html" %}
{% block title %}Seed {{ seed.seed_id }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a class="text-sm text-sky-300 hover:text-sky-200" href="{{ request.url_for('dashboard') }}?seed_id={{ seed.seed_id }}">
    Back to dashboard
  </a>
</div>
<div
  id="seed-detail"
  data-seed-detail-url-template="{{ request.url_for('seed_detail_partial', seed_id='__SEED_ID__') }}"
  data-seed-versions-url-template="{{ request.url_for('seed_versions', seed_id='__SEED_ID__') }}"
  data-seed-runs-url-template="{{ request.url_for('seed_runs_partial', seed_id='__SEED_ID__') }}"
  data-seed-timeline-url-template="{{ request.url_for('seed_timeline_partial', seed_id='__SEED_ID__') }}"
>
  {% include "partials/seed_detail.html" %}
</div>
{% endblock %}
