name: packaging

on:
  pull_request:
  push:
    branches: [master]

jobs:
  editable-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip
      - name: Verify editable install works
        run: pip install -e . --no-deps
