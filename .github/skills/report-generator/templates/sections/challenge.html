<section id="challenge" class="section section-challenge">
    <div class="section-content">
        <h2 class="section-heading">The Challenge</h2>
        
        <!-- Optimization Goal -->
        <div class="challenge-goal">
            <span class="challenge-direction-icon">
                {% if report.metric_direction == "higher" %}
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                {% else %}
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                {% endif %}
            </span>
            <span class="challenge-goal-text">
                Maximize <strong>{{ report.metric_name }}</strong>
            </span>
        </div>

        <!-- Experiment Scope (compact target list) -->
        <div class="scope-block">
            <h4 class="scope-title">Experiment scope</h4>
            <div class="scope-targets">
                {% for target in report.targets %}
                <span class="scope-target" title="{{ target.path }} -- {{ target.description }}">
                    <code>{{ target.path.split('/')[-1] }}</code>
                </span>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
