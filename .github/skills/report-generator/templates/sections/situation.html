<section id="situation" class="section section-situation">
    <div class="section-content">
        <!-- Hero -->
        <div class="hero">
            <h1 class="hero-title">{{ report.workflow_name }}</h1>
            <p class="hero-subtitle">{{ report.workflow_description }}</p>
        </div>

        <!-- Starting Point -->
        {% if report.baseline %}
        <div class="baseline-hero">
            <span class="baseline-label">Starting point</span>
            <span class="baseline-metric-value">{{ "%.4f"|format(report.baseline.metric_value) }}</span>
            <span class="baseline-metric-name">{{ report.metric_name }}</span>
        </div>
        {% endif %}

        <!-- Context -->
        <div class="context-footer">
            <span class="context-item">
                <span class="context-label">Branch:</span>
                <code>{{ report.branch_name }}</code>
            </span>
            <span class="context-item">
                <span class="context-label">Experiments:</span>
                <strong>{{ report.total_experiments }}</strong>
            </span>
        </div>
    </div>
</section>
