[project]
name = "autoresearch"
version = "0.2.0"
description = "Autonomous OOD feature-mining and modeling loop for deception2"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "joblib>=1.4.2",
    "matplotlib>=3.10.8",
    "numpy>=2.2.6",
    "pandas>=2.3.3",
    "pyarrow>=21.0.0",
    "scikit-learn>=1.7.1",
    "torch==2.9.1",
    "transformers>=4.57.0",
    "xgboost>=3.0.5",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
