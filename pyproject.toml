[project]
name = "autotrader"
version = "0.2.0"
description = "Autonomous ML prediction research platform"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "cot-reports",
    "matplotlib>=3.10.0",
    "numpy>=2.0.0",
    "pandas>=2.2.0",
    "pyarrow>=15.0.0",
    "requests>=2.32.0",
    "scikit-learn>=1.5.0",
    "torch>=2.5.0",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["core*"]
