[project]
name = "mlxresearch"
version = "0.1.0"
description = "AI agents running research on Apple Silicon MLX training automatically — no NVIDIA required"
requires-python = ">=3.12"
dependencies = [
    "mlx>=0.24.0",
    "mlx-lm>=0.22.0",
    "numpy",
    "requests",
    "huggingface-hub",
    "safetensors",
    "datasets",
    "pyarrow>=21.0.0",
    "rustbpe>=0.1.0",
    "tiktoken>=0.11.0",
]

[tool.setuptools]
py-modules = ["train", "prepare"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
