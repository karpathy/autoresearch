[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autoanything"
version = "0.1.0"
description = "Autonomous optimization via AI agent swarms"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115.0",
    "pyyaml>=6.0",
    "requests>=2.32.0",
    "uvicorn>=0.34.0",
]

[project.optional-dependencies]
dev = [
    "click>=8.0",
    "httpx>=0.27",
    "pytest>=7.0",
    "rich>=13.0",
]
examples = [
    "kernels>=0.11.7",
    "matplotlib>=3.10.8",
    "numpy>=2.2.6",
    "pandas>=2.3.3",
    "pyarrow>=21.0.0",
    "tiktoken>=0.11.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/autoanything"]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
